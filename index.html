<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>父亲节快乐</title>
  <style>
    :root {
      --背景: #0f1115;
      --背景二: #111319;
      --文字: #f5f1e8;
      --弱文字: rgba(245, 241, 232, 0.66);
      --淡文字: rgba(245, 241, 232, 0.42);
      --金色: #c9a45c;
      --淡金: rgba(201, 164, 92, 0.2);
      --边线: rgba(245, 241, 232, 0.12);
      --卡片: rgba(245, 241, 232, 0.055);
      --阴影: 0 22px 70px rgba(0, 0, 0, 0.34);
      --圆角: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--背景);
      color: var(--文字);
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
      letter-spacing: 0;
    }

    body {
      background:
        radial-gradient(circle at 18% 8%, rgba(201, 164, 92, 0.18), transparent 30rem),
        radial-gradient(circle at 92% 38%, rgba(201, 164, 92, 0.12), transparent 24rem),
        linear-gradient(180deg, #0f1115 0%, #101216 52%, #0b0d11 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.014) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.56), transparent 74%);
      opacity: 0.35;
    }

    button {
      font: inherit;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .舞台 {
      position: relative;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
    }

    .页面 {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      width: 100%;
      min-height: 100dvh;
      padding: max(34px, env(safe-area-inset-top)) 20px max(22px, env(safe-area-inset-bottom));
      overflow-x: hidden;
      overflow-y: auto;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(18px);
      transition: opacity 520ms ease, transform 520ms ease, visibility 520ms ease;
      scrollbar-width: none;
    }

    .页面::-webkit-scrollbar {
      display: none;
    }

    .页面.当前 {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0);
    }

    .页面主体 {
      width: min(100%, 720px);
      align-self: center;
      justify-self: center;
      padding: 42px 0 28px;
    }

    .首页 .页面主体 {
      text-align: center;
      transform: translateY(-2vh);
    }

    .小字 {
      margin: 0 0 18px;
      color: var(--金色);
      font-size: 13px;
      line-height: 1.6;
      letter-spacing: 0.26em;
      text-indent: 0.26em;
    }

    h1,
    h2 {
      margin: 0;
      font-weight: 470;
    }

    h1 {
      font-size: clamp(42px, 13vw, 70px);
      line-height: 1.06;
      letter-spacing: 0.02em;
    }

    .页面标题 {
      font-size: clamp(28px, 8vw, 44px);
      line-height: 1.18;
    }

    .说明 {
      margin: 22px auto 0;
      max-width: 22em;
      color: var(--弱文字);
      font-size: 15px;
      line-height: 1.9;
    }

    .标题区 {
      margin-bottom: 22px;
    }

    .细线 {
      width: 46px;
      height: 1px;
      margin-top: 18px;
      background: linear-gradient(90deg, var(--金色), transparent);
      opacity: 0.9;
    }

    .卡片组 {
      display: grid;
      gap: 13px;
    }

    .卡片 {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--边线);
      border-radius: var(--圆角);
      padding: 22px 20px;
      background:
        linear-gradient(135deg, rgba(245, 241, 232, 0.075), rgba(245, 241, 232, 0.032)),
        var(--卡片);
      box-shadow: var(--阴影);
    }

    .卡片::after {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      width: 42%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201, 164, 92, 0.56));
    }

    .卡片 h2 {
      font-size: 20px;
      line-height: 1.35;
    }

    .卡片 p {
      margin: 22px 0 0;
      color: var(--弱文字);
      font-size: 15px;
      line-height: 1.85;
    }

    .照片组 {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .照片按钮 {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      overflow: hidden;
      border: 1px solid rgba(245, 241, 232, 0.1);
      border-radius: 17px;
      padding: 0;
      background:
        radial-gradient(circle at 50% 26%, rgba(201, 164, 92, 0.16), transparent 48%),
        linear-gradient(145deg, rgba(245, 241, 232, 0.08), rgba(245, 241, 232, 0.035));
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
      cursor: pointer;
      transform: translateZ(0);
      transition: transform 160ms ease, border-color 160ms ease;
    }

    .照片按钮:active {
      transform: scale(0.985);
      border-color: rgba(201, 164, 92, 0.36);
    }

    .照片按钮 img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      filter: saturate(0.72) contrast(0.96) brightness(0.88);
    }

    .照片按钮 img.缺少 {
      opacity: 0;
    }

    .礼物内容 {
      display: grid;
      gap: 22px;
    }

    .礼物文字,
    .页面信息,
    .落款 {
      border: 1px solid var(--边线);
      border-radius: var(--圆角);
      background: rgba(245, 241, 232, 0.045);
      box-shadow: var(--阴影);
    }

    .礼物文字 {
      padding: 24px 22px;
    }

    .礼物文字 p {
      margin: 0;
      color: var(--弱文字);
      font-size: 16px;
      line-height: 1.9;
      white-space: pre-line;
    }

    .页面信息 {
      padding: 20px 22px;
      color: var(--弱文字);
      font-size: 14px;
      line-height: 1.9;
    }

    .落款 {
      padding: 18px 22px;
      color: var(--淡文字);
      font-size: 13px;
      line-height: 1.9;
      text-align: center;
      box-shadow: none;
      background: rgba(245, 241, 232, 0.026);
    }

    .底部操作 {
      width: min(100%, 720px);
      justify-self: center;
      padding-bottom: 24px;
    }

    .主按钮,
    .关闭按钮 {
      width: 100%;
      min-height: 48px;
      border: 1px solid rgba(201, 164, 92, 0.48);
      border-radius: 999px;
      background: rgba(201, 164, 92, 0.12);
      color: var(--文字);
      cursor: pointer;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.24);
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .主按钮:active,
    .关闭按钮:active {
      transform: scale(0.97);
      background: rgba(201, 164, 92, 0.2);
      border-color: rgba(201, 164, 92, 0.66);
    }

    .页码 {
      position: absolute;
      top: max(18px, env(safe-area-inset-top));
      right: 20px;
      color: rgba(245, 241, 232, 0.34);
      font-size: 12px;
      line-height: 1;
    }

    .开场项 {
      opacity: 0;
      transform: translateY(14px);
      animation: 淡入上移 760ms ease forwards;
    }

    .延迟一 { animation-delay: 120ms; }
    .延迟二 { animation-delay: 340ms; }
    .延迟三 { animation-delay: 560ms; }

    .当前 .入场 {
      animation: 页面入场 540ms ease both;
    }

    @keyframes 淡入上移 {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes 页面入场 {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .预览背景 {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 16px;
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
      background: rgba(0, 0, 0, 0.84);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 220ms ease, visibility 220ms ease;
    }

    .预览背景.打开 {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .预览图框 {
      align-self: center;
      justify-self: center;
      width: min(100%, 760px);
      max-height: 82vh;
      overflow: hidden;
      border-radius: 18px;
      background:
        radial-gradient(circle at 50% 28%, rgba(201, 164, 92, 0.18), transparent 50%),
        #17191f;
      box-shadow: 0 24px 86px rgba(0, 0, 0, 0.58);
    }

    .预览图框 img {
      width: 100%;
      max-height: 82vh;
      display: block;
      object-fit: contain;
      filter: saturate(0.78) contrast(0.98) brightness(0.92);
    }

    .预览图框 img.缺少 {
      min-height: 52vh;
      opacity: 0;
    }

    .预览关闭 {
      width: min(100%, 220px);
      justify-self: center;
      box-shadow: none;
    }

    @media (min-width: 720px) {
      .页面 {
        padding-left: 32px;
        padding-right: 32px;
      }

      .卡片组 {
        grid-template-columns: repeat(3, 1fr);
      }

      .卡片 {
        min-height: 210px;
      }

      .照片组 {
        grid-template-columns: repeat(2, 1fr);
        gap: 18px;
      }

      .照片按钮 {
        aspect-ratio: 4 / 5;
      }

      .主按钮 {
        width: min(100%, 360px);
        display: block;
        margin: 0 auto;
      }
    }

    @media (max-height: 760px) {
      .页面主体 {
        padding-top: 26px;
        padding-bottom: 18px;
      }

      .照片按钮 {
        aspect-ratio: 16 / 9;
      }

      .卡片 p {
        margin-top: 16px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        transition-duration: 1ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="舞台" id="舞台" aria-label="父亲节礼物">
    <section class="页面 首页 当前" data-page="1" aria-label="首页">
      <div class="页码">1 / 6</div>
      <div class="页面主体">
        <p class="小字 开场项 延迟一">父亲节</p>
        <h1 class="开场项 延迟二">父亲节快乐</h1>
        <p class="说明 开场项 延迟三">樱桃蛋糕送给你的父亲节礼物</p>
      </div>
      <div class="底部操作">
        <button class="主按钮" type="button" data-go="2">打开</button>
      </div>
    </section>

    <section class="页面" data-page="2" aria-label="三个阶段">
      <div class="页码">2 / 6</div>
      <div class="页面主体 入场">
        <div class="标题区">
          <h2 class="页面标题">三个阶段</h2>
          <div class="细线" aria-hidden="true"></div>
        </div>
        <div class="卡片组">
          <article class="卡片">
            <h2>这些年</h2>
            <p>很多事情我平时不太说，但我都记得。</p>
          </article>
          <article class="卡片">
            <h2>现在</h2>
            <p>我会慢慢把自己的事情处理好，少让你操心。</p>
          </article>
          <article class="卡片">
            <h2>以后</h2>
            <p>现在确实还没赚到钱，但以后肯定会越来越行。</p>
          </article>
        </div>
      </div>
      <div class="底部操作">
        <button class="主按钮" type="button" data-go="3">下一个</button>
      </div>
    </section>

    <section class="页面" data-page="3" aria-label="一些瞬间">
      <div class="页码">3 / 6</div>
      <div class="页面主体 入场">
        <div class="标题区">
          <h2 class="页面标题">一些瞬间</h2>
          <div class="细线" aria-hidden="true"></div>
        </div>
        <div class="照片组">
          <button class="照片按钮" type="button" data-src="images/image1.jpg" aria-label="查看照片">
            <img src="images/image1.jpg" alt="一些瞬间">
          </button>
          <button class="照片按钮" type="button" data-src="images/image2.jpg" aria-label="查看照片">
            <img src="images/image2.jpg" alt="一些瞬间">
          </button>
        </div>
      </div>
      <div class="底部操作">
        <button class="主按钮" type="button" data-go="4">下一个</button>
      </div>
    </section>

    <section class="页面" data-page="4" aria-label="一些瞬间">
      <div class="页码">4 / 6</div>
      <div class="页面主体 入场">
        <div class="标题区">
          <h2 class="页面标题">一些瞬间</h2>
          <div class="细线" aria-hidden="true"></div>
        </div>
        <div class="照片组">
          <button class="照片按钮" type="button" data-src="images/image4.jpg" aria-label="查看照片">
            <img src="images/image4.jpg" alt="一些瞬间">
          </button>
          <button class="照片按钮" type="button" data-src="images/image5.jpg" aria-label="查看照片">
            <img src="images/image5.jpg" alt="一些瞬间">
          </button>
        </div>
      </div>
      <div class="底部操作">
        <button class="主按钮" type="button" data-go="5">下一个</button>
      </div>
    </section>

    <section class="页面" data-page="5" aria-label="一些瞬间">
      <div class="页码">5 / 6</div>
      <div class="页面主体 入场">
        <div class="标题区">
          <h2 class="页面标题">一些瞬间</h2>
          <div class="细线" aria-hidden="true"></div>
        </div>
        <div class="照片组">
          <button class="照片按钮" type="button" data-src="images/image3.jpg" aria-label="查看照片">
            <img src="images/image3.jpg" alt="一些瞬间">
          </button>
          <button class="照片按钮" type="button" data-src="images/image6.jpg" aria-label="查看照片">
            <img src="images/image6.jpg" alt="一些瞬间">
          </button>
        </div>
      </div>
      <div class="底部操作">
        <button class="主按钮" type="button" data-go="6">下一个</button>
      </div>
    </section>

    <section class="页面" data-page="6" aria-label="今年的礼物">
      <div class="页码">6 / 6</div>
      <div class="页面主体 入场">
        <div class="标题区">
          <h2 class="页面标题">今年的礼物</h2>
          <div class="细线" aria-hidden="true"></div>
        </div>
        <div class="礼物内容">
          <div class="礼物文字">
            <p>这个网页就是今年的礼物。
父亲节快乐，身体健康。</p>
          </div>
          <div class="页面信息">
            <div>制作：智翔</div>
            <div>时间：2026 父亲节</div>
            <div>内容：页面、文案、照片</div>
          </div>
          <footer class="落款">
            <div>制作：智翔</div>
            <div>2026 父亲节</div>
          </footer>
        </div>
      </div>
      <div class="底部操作">
        <button class="主按钮" type="button" data-go="1">回到首页</button>
      </div>
    </section>
  </main>

  <div class="预览背景" id="照片预览" role="dialog" aria-modal="true" aria-label="照片预览">
    <div class="预览图框">
      <img id="预览图片" src="" alt="照片预览">
    </div>
    <button class="关闭按钮 预览关闭" type="button" id="关闭预览">关闭</button>
  </div>

  <script>
    const 页面列表 = Array.from(document.querySelectorAll(".页面"));
    const 跳转按钮 = document.querySelectorAll("[data-go]");
    const 照片按钮 = document.querySelectorAll(".照片按钮");
    const 照片预览 = document.querySelector("#照片预览");
    const 预览图片 = document.querySelector("#预览图片");
    const 关闭预览 = document.querySelector("#关闭预览");

    function 切换页面(页码) {
      页面列表.forEach((页面) => {
        const 是否当前 = 页面.dataset.page === String(页码);
        页面.classList.toggle("当前", 是否当前);
        if (是否当前) {
          页面.scrollTop = 0;
        }
      });
    }

    跳转按钮.forEach((按钮) => {
      按钮.addEventListener("click", () => {
        切换页面(按钮.dataset.go);
      });
    });

    document.querySelectorAll("img").forEach((图片) => {
      图片.addEventListener("error", () => {
        图片.classList.add("缺少");
      }, { once: true });
    });

    照片按钮.forEach((按钮) => {
      按钮.addEventListener("click", () => {
        预览图片.classList.remove("缺少");
        预览图片.src = 按钮.dataset.src;
        照片预览.classList.add("打开");
        关闭预览.focus({ preventScroll: true });
      });
    });

    function 关闭照片预览() {
      照片预览.classList.remove("打开");
      setTimeout(() => {
        if (!照片预览.classList.contains("打开")) {
          预览图片.removeAttribute("src");
        }
      }, 230);
    }

    关闭预览.addEventListener("click", 关闭照片预览);
    照片预览.addEventListener("click", (事件) => {
      if (事件.target === 照片预览) {
        关闭照片预览();
      }
    });

    window.addEventListener("keydown", (事件) => {
      if (事件.key === "Escape") {
        关闭照片预览();
      }
    });
  </script>
</body>
</html>

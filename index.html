<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>父亲节快乐</title>
  <style>
    :root {
      --bg: #0f1115;
      --bg-soft: #15171d;
      --card: rgba(245, 241, 232, 0.055);
      --card-border: rgba(245, 241, 232, 0.11);
      --text: #f5f1e8;
      --muted: rgba(245, 241, 232, 0.68);
      --dim: rgba(245, 241, 232, 0.48);
      --gold: #c9a45c;
      --gold-soft: rgba(201, 164, 92, 0.18);
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.35);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      scroll-behavior: smooth;
    }

    body {
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
      background:
        radial-gradient(circle at 18% 8%, rgba(201, 164, 92, 0.18), transparent 30rem),
        radial-gradient(circle at 92% 38%, rgba(201, 164, 92, 0.12), transparent 24rem),
        linear-gradient(180deg, #0f1115 0%, #101216 52%, #0b0d11 100%);
      letter-spacing: 0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.014) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.56), transparent 74%);
      opacity: 0.35;
    }

    button {
      font: inherit;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .开场 {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 32px 22px;
      background:
        radial-gradient(circle at 50% 34%, rgba(201, 164, 92, 0.14), transparent 20rem),
        rgba(15, 17, 21, 0.98);
      transition: opacity 720ms ease, visibility 720ms ease;
    }

    .开场.离开 {
      opacity: 0;
      visibility: hidden;
    }

    .开场内容 {
      width: min(100%, 430px);
      text-align: center;
      transform: translateY(-2vh);
    }

    .小字 {
      margin: 0 0 18px;
      color: var(--gold);
      font-size: 13px;
      line-height: 1.6;
      letter-spacing: 0.26em;
      text-indent: 0.26em;
    }

    .开场 h1 {
      margin: 0;
      font-size: clamp(42px, 13vw, 70px);
      line-height: 1.06;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .副标题 {
      margin: 22px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.9;
    }

    .按钮组 {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 34px;
      flex-wrap: wrap;
    }

    .主按钮,
    .次按钮,
    .关闭按钮 {
      border: 1px solid rgba(201, 164, 92, 0.46);
      border-radius: 999px;
      background: rgba(201, 164, 92, 0.12);
      min-height: 46px;
      padding: 0 24px;
      color: var(--text);
      cursor: pointer;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.24);
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .主按钮:active,
    .次按钮:active,
    .关闭按钮:active {
      transform: scale(0.97);
      background: rgba(201, 164, 92, 0.2);
      border-color: rgba(201, 164, 92, 0.66);
    }

    .次按钮 {
      min-height: 42px;
      padding: 0 18px;
      color: var(--muted);
      background: rgba(245, 241, 232, 0.05);
      border-color: rgba(245, 241, 232, 0.16);
      box-shadow: none;
    }

    .依次出现 {
      opacity: 0;
      transform: translateY(14px);
      animation: 淡入上移 760ms ease forwards;
    }

    .延迟一 { animation-delay: 160ms; }
    .延迟二 { animation-delay: 380ms; }
    .延迟三 { animation-delay: 620ms; }
    .延迟四 { animation-delay: 880ms; }

    @keyframes 淡入上移 {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    main {
      min-height: 100vh;
      opacity: 0;
      visibility: hidden;
      transform: translateY(10px);
      transition: opacity 850ms ease, transform 850ms ease, visibility 850ms ease;
    }

    main.显示 {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .页面 {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: max(30px, env(safe-area-inset-top)) 18px max(32px, env(safe-area-inset-bottom));
    }

    .顶部 {
      padding: 26px 4px 34px;
    }

    .年份 {
      margin: 0;
      color: var(--gold);
      font-size: 13px;
      line-height: 1.7;
      letter-spacing: 0.16em;
    }

    .地点 {
      margin: 8px 0 0;
      font-size: clamp(28px, 8vw, 48px);
      line-height: 1.18;
      font-weight: 450;
    }

    .分隔 {
      width: 46px;
      height: 1px;
      margin-top: 26px;
      background: linear-gradient(90deg, var(--gold), transparent);
      opacity: 0.9;
    }

    .卡片区 {
      display: grid;
      gap: 14px;
      margin-top: 10px;
    }

    .卡片 {
      position: relative;
      min-height: 154px;
      overflow: hidden;
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 24px 22px;
      background:
        linear-gradient(135deg, rgba(245, 241, 232, 0.075), rgba(245, 241, 232, 0.032)),
        var(--card);
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 760ms ease, transform 760ms ease;
    }

    .卡片::after {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      width: 42%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201, 164, 92, 0.56));
    }

    .卡片.出现 {
      opacity: 1;
      transform: translateY(0);
    }

    .卡片 h2,
    .照片标题,
    .互动标题 {
      margin: 0;
      font-size: 20px;
      line-height: 1.35;
      font-weight: 470;
    }

    .卡片 p {
      margin: 28px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.9;
    }

    .照片区,
    .互动区 {
      margin-top: 56px;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 760ms ease, transform 760ms ease;
    }

    .照片区.出现,
    .互动区.出现 {
      opacity: 1;
      transform: translateY(0);
    }

    .照片标题,
    .互动标题 {
      padding: 0 4px;
    }

    .照片网格 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    .照片按钮 {
      position: relative;
      display: block;
      width: 100%;
      aspect-ratio: 4 / 5;
      overflow: hidden;
      border: 1px solid rgba(245, 241, 232, 0.1);
      border-radius: 16px;
      padding: 0;
      background:
        radial-gradient(circle at 50% 26%, rgba(201, 164, 92, 0.18), transparent 48%),
        linear-gradient(145deg, rgba(245, 241, 232, 0.08), rgba(245, 241, 232, 0.035));
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
      cursor: pointer;
      transform: translateZ(0);
    }

    .照片按钮:active {
      transform: scale(0.985);
    }

    .照片按钮 img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      filter: saturate(0.72) contrast(0.96) brightness(0.86);
      transition: transform 220ms ease, opacity 220ms ease;
    }

    .照片按钮 img.缺少 {
      opacity: 0;
    }

    .照片按钮::after {
      content: attr(data-name);
      position: absolute;
      inset: auto 14px 13px;
      color: rgba(245, 241, 232, 0.56);
      font-size: 13px;
      line-height: 1.4;
      text-align: left;
    }

    .互动区 {
      display: grid;
      gap: 14px;
      margin-bottom: 48px;
    }

    .互动卡 {
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 24px 22px;
      background: rgba(245, 241, 232, 0.045);
      box-shadow: var(--shadow);
    }

    .互动卡 p {
      margin: 12px 0 0;
      color: var(--dim);
      line-height: 1.8;
      font-size: 14px;
    }

    .互动按钮列 {
      display: grid;
      gap: 10px;
      margin-top: 22px;
    }

    .互动按钮列 .主按钮,
    .互动按钮列 .次按钮 {
      width: 100%;
    }

    .落款 {
      padding: 34px 0 18px;
      text-align: center;
      color: var(--dim);
      font-size: 13px;
      line-height: 1.9;
    }

    .弹窗背景 {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.7);
      opacity: 0;
      visibility: hidden;
      transition: opacity 220ms ease, visibility 220ms ease;
    }

    .弹窗背景.打开 {
      opacity: 1;
      visibility: visible;
    }

    .弹窗 {
      width: min(100%, 390px);
      border: 1px solid rgba(201, 164, 92, 0.28);
      border-radius: 20px;
      padding: 24px 22px 20px;
      background:
        radial-gradient(circle at 82% 0%, rgba(201, 164, 92, 0.14), transparent 12rem),
        #14161b;
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.56);
      transform: translateY(12px) scale(0.98);
      transition: transform 220ms ease;
    }

    .弹窗背景.打开 .弹窗 {
      transform: translateY(0) scale(1);
    }

    .弹窗 p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.9;
      white-space: pre-line;
    }

    .弹窗 .关闭按钮 {
      width: 100%;
      margin-top: 22px;
      box-shadow: none;
    }

    .预览背景 {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 16px;
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
      background: rgba(0, 0, 0, 0.84);
      opacity: 0;
      visibility: hidden;
      transition: opacity 220ms ease, visibility 220ms ease;
    }

    .预览背景.打开 {
      opacity: 1;
      visibility: visible;
    }

    .预览图框 {
      align-self: center;
      justify-self: center;
      width: min(100%, 760px);
      max-height: 82vh;
      overflow: hidden;
      border-radius: 18px;
      background:
        radial-gradient(circle at 50% 28%, rgba(201, 164, 92, 0.18), transparent 50%),
        #17191f;
      box-shadow: 0 24px 86px rgba(0, 0, 0, 0.58);
    }

    .预览图框 img {
      width: 100%;
      max-height: 82vh;
      display: block;
      object-fit: contain;
      filter: saturate(0.78) contrast(0.98) brightness(0.92);
    }

    .预览图框 img.缺少 {
      min-height: 52vh;
      opacity: 0;
    }

    .预览关闭 {
      justify-self: center;
      min-width: 118px;
    }

    @media (min-width: 720px) {
      .页面 {
        padding-top: 54px;
      }

      .卡片区 {
        grid-template-columns: repeat(3, 1fr);
      }

      .卡片 {
        min-height: 210px;
      }

      .照片网格 {
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }

      .互动按钮列 {
        grid-template-columns: 1.3fr 1fr;
      }
    }

    @media (max-width: 430px) {
      .照片网格 {
        gap: 10px;
      }

      .卡片,
      .互动卡 {
        padding: 22px 20px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        transition-duration: 1ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <section class="开场" id="开场">
    <div class="开场内容" aria-label="父亲节开场">
      <p class="小字 依次出现 延迟一">父亲节</p>
      <h1 class="依次出现 延迟二">父亲节快乐</h1>
      <p class="副标题 依次出现 延迟三">樱桃蛋糕送给你的父亲节礼物</p>
      <div class="按钮组 依次出现 延迟四">
        <button class="主按钮" type="button" id="打开页面">打开</button>
      </div>
    </div>
  </section>

  <main id="主内容" aria-label="父亲节礼物内容">
    <div class="页面">
      <header class="顶部">
        <p class="年份">2026 父亲节</p>
        <h2 class="地点">送给爸爸</h2>
        <div class="分隔" aria-hidden="true"></div>
      </header>

      <section class="卡片区" aria-label="想说的话">
        <article class="卡片 待出现">
          <h2>这些年</h2>
          <p>很多事情我平时不太说，但我都记得。</p>
        </article>

        <article class="卡片 待出现">
          <h2>现在</h2>
          <p>我会慢慢把自己的事情处理好，少让你操心。</p>
        </article>

        <article class="卡片 待出现">
          <h2>以后</h2>
          <p>现在确实还没赚到钱，但以后肯定会越来越行。</p>
        </article>
      </section>

      <section class="照片区 待出现" aria-label="一些瞬间">
        <h2 class="照片标题">一些瞬间</h2>
        <div class="照片网格">
          <button class="照片按钮" type="button" data-src="images/image1.jpg" data-name="照片一">
            <img src="images/image1.jpg" alt="照片一">
          </button>
          <button class="照片按钮" type="button" data-src="images/image2.jpg" data-name="照片二">
            <img src="images/image2.jpg" alt="照片二">
          </button>
          <button class="照片按钮" type="button" data-src="images/image3.jpg" data-name="照片三">
            <img src="images/image3.jpg" alt="照片三">
          </button>
          <button class="照片按钮" type="button" data-src="images/image4.jpg" data-name="照片四">
            <img src="images/image4.jpg" alt="照片四">
          </button>
          <button class="照片按钮" type="button" data-src="images/image5.jpg" data-name="照片五">
            <img src="images/image5.jpg" alt="照片五">
          </button>
          <button class="照片按钮" type="button" data-src="images/image6.jpg" data-name="照片六">
            <img src="images/image6.jpg" alt="照片六">
          </button>
        </div>
      </section>

      <section class="互动区 待出现" aria-label="今年的礼物">
        <div class="互动卡">
          <h2 class="互动标题">今年的礼物</h2>
          <div class="互动按钮列">
            <button class="主按钮" type="button" id="打开礼物">打开今年的礼物</button>
            <button class="次按钮" type="button" id="页面信息">页面信息</button>
          </div>
        </div>
      </section>

      <footer class="落款">
        <div>制作：智翔</div>
        <div>2026 父亲节</div>
      </footer>
    </div>
  </main>

  <div class="弹窗背景" id="文字弹窗" role="dialog" aria-modal="true" aria-label="弹窗">
    <div class="弹窗">
      <p id="弹窗内容"></p>
      <button class="关闭按钮" type="button" id="关闭弹窗">关闭</button>
    </div>
  </div>

  <div class="预览背景" id="照片预览" role="dialog" aria-modal="true" aria-label="照片预览">
    <div class="预览图框">
      <img id="预览图片" src="" alt="照片预览">
    </div>
    <button class="关闭按钮 预览关闭" type="button" id="关闭预览">关闭</button>
  </div>

  <script>
    const 开场 = document.querySelector("#开场");
    const 主内容 = document.querySelector("#主内容");
    const 打开页面 = document.querySelector("#打开页面");
    const 待出现元素 = document.querySelectorAll(".待出现");
    const 文字弹窗 = document.querySelector("#文字弹窗");
    const 弹窗内容 = document.querySelector("#弹窗内容");
    const 关闭弹窗 = document.querySelector("#关闭弹窗");
    const 打开礼物 = document.querySelector("#打开礼物");
    const 页面信息 = document.querySelector("#页面信息");
    const 照片预览 = document.querySelector("#照片预览");
    const 预览图片 = document.querySelector("#预览图片");
    const 关闭预览 = document.querySelector("#关闭预览");

    const 观察器 = new IntersectionObserver((列表) => {
      列表.forEach((项目) => {
        if (项目.isIntersecting) {
          项目.target.classList.add("出现");
          观察器.unobserve(项目.target);
        }
      });
    }, {
      threshold: 0.18,
      rootMargin: "0px 0px -8% 0px"
    });

    待出现元素.forEach((元素, 序号) => {
      元素.style.transitionDelay = `${Math.min(序号 * 90, 260)}ms`;
      观察器.observe(元素);
    });

    打开页面.addEventListener("click", () => {
      开场.classList.add("离开");
      主内容.classList.add("显示");
      setTimeout(() => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }, 120);
    });

    document.querySelectorAll("img").forEach((图片) => {
      图片.addEventListener("error", () => {
        图片.classList.add("缺少");
      }, { once: true });
    });

    function 显示文字弹窗(内容) {
      弹窗内容.textContent = 内容;
      文字弹窗.classList.add("打开");
      关闭弹窗.focus({ preventScroll: true });
    }

    function 隐藏文字弹窗() {
      文字弹窗.classList.remove("打开");
    }

    打开礼物.addEventListener("click", () => {
      显示文字弹窗("这个网页就是今年的礼物。\n父亲节快乐，身体健康。");
    });

    页面信息.addEventListener("click", () => {
      显示文字弹窗("制作：智翔\n时间：2026 父亲节\n内容：页面、文案、照片");
    });

    关闭弹窗.addEventListener("click", 隐藏文字弹窗);
    文字弹窗.addEventListener("click", (事件) => {
      if (事件.target === 文字弹窗) {
        隐藏文字弹窗();
      }
    });

    document.querySelectorAll(".照片按钮").forEach((按钮) => {
      按钮.addEventListener("click", () => {
        const 地址 = 按钮.dataset.src;
        const 名称 = 按钮.dataset.name;
        预览图片.classList.remove("缺少");
        预览图片.src = 地址;
        预览图片.alt = 名称;
        照片预览.classList.add("打开");
        关闭预览.focus({ preventScroll: true });
      });
    });

    function 隐藏照片预览() {
      照片预览.classList.remove("打开");
      setTimeout(() => {
        if (!照片预览.classList.contains("打开")) {
          预览图片.removeAttribute("src");
        }
      }, 230);
    }

    关闭预览.addEventListener("click", 隐藏照片预览);
    照片预览.addEventListener("click", (事件) => {
      if (事件.target === 照片预览) {
        隐藏照片预览();
      }
    });

    window.addEventListener("keydown", (事件) => {
      if (事件.key === "Escape") {
        隐藏文字弹窗();
        隐藏照片预览();
      }
    });
  </script>
</body>
</html>
